name: Daily Reel Generation

on:
  schedule:
    # 05:30 UTC daily
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  generate-reel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install ffmpeg and fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Generate and post reel
        env:
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
          AZURE_TTS_KEY: ${{ secrets.AZURE_TTS_KEY }}
          AZURE_TTS_REGION: ${{ secrets.AZURE_TTS_REGION }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          PUBMED_EMAIL: ${{ secrets.PUBMED_EMAIL }}
        run: python -m src.main

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-output
          path: |
            reel_*.mp4
          retention-days: 7
